spring.application.name=api_gateway

# Spring Cloud Gateway Routes

spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://LMS-AUTH-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/auth/**

spring.cloud.gateway.routes[1].id=course-service
spring.cloud.gateway.routes[1].uri=lb://LMS-COURSE-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/courses/**
